<!DOCTYPE html>
<html>
<head>
    <title>Smart Expense Tracker Agent</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🤖 Smart Expense Tracker Agent</h1>

    <form method="POST" action="/add">
        <input type="text" name="name" placeholder="Expense Name" required>

        <input type="number" step="0.01" name="amount" placeholder="Amount" required>

        <button type="submit">Analyze Expense</button>
    </form>

    {% if result %}
    <div class="card">
        <h2>Expense Analysis</h2>

        <p><strong>Name:</strong> {{ result.name }}</p>
        <p><strong>Category:</strong> {{ result.category }}</p>
        <p><strong>Amount:</strong> ₹{{ result.amount }}</p>

        <h3>Total Spending: ₹{{ result.total }}</h3>

        <h3>AI Recommendation</h3>
        <p>{{ result.recommendation }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
